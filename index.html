    const CONNECTOR_TYPES = Object.keys(TERMINAL_DATA);

    const APP_VERSION = "V2.0";

    const HISTORY = [
      {
        version: "V2.0",
        date: "2025-04-15",
        tag: "新功能",

        ],
      },
      {
        version: "V1.x",
        date: "2025-04-01",
        tag: "初始版本",
        tagColor: "1E40AF",
        tagBg: "DBEAFE",
        items: [
          "線材組態輸入：Handler Model、線名、線長、線徑（AWG / mm²）、線芯數量",
          "線組資訊：各芯序線色（含圓點預覽）、線碼、左右端端子兩層下拉、芯序備註",
          "內建端子型錄：六大類共 54+ 種規格（歐式、母壓排、R型、Y型、全絕緣母端子、AMP PIN針）",
          "歐式端子下拉以「顏色（型號）（AWG/mm²）」格式顯示",
          "母壓排智能鎖定：依線芯數量自動決定 P 數，任一芯序選取後同步全部芯序",

          "匯出 Excel：彩色格式，線色欄套用對應背景色，左右端類型標籤色，多芯合併儲存格，機器分頁",
          "匯出規格欄位完整帶入選單顯示內容（含 AWG / mm² 資訊）",
          "相同端子類型/規格時跨芯序合併儲存格",
          "匯出檔名格式：{機型}_線材總表_{日期}.xlsx",
          "線組備註（整組）與芯序備註（各芯獨立）",
        ],
      },
    ];
    const WIRE_COLORS = ["棕","黑","紅","橙","黃","綠","藍","紫","白","灰","黃綠"];
    const COLOR_CYCLE = ["棕","紅","橙","黃","綠","藍","紫","灰","白","黑"];
    const COLOR_DOTS = {
      "棕":"#92400e","黑":"#1e293b","紅":"#ef4444","橙":"#f97316",
      "黃":"#eab308","綠":"#22c55e","藍":"#3b82f6","紫":"#a855f7",
      "白":"#e2e8f0","灰":"#94a3b8","黃綠":"#84cc16",
    };

    const emptyCore = () => ({
      color: "", code: "",
      leftEndType: "", leftEndModel: "",
      rightEndType: "", rightEndModel: "",
      remark: "",
    });

    const emptyForm = (machineName = "") => ({
      machineName,
      wireName: "", wireLength: "",
      wireGauge: "", wireGaugeUnit: "AWG",
      wireRemark: "",
      coreCount: "1",
      cores: [emptyCore()],
    });

    /* ─── Styles ─────────────────────────────────────────────────────────── */
    const selStyle = {
      border: "1px solid #cbd5e1", borderRadius: 4, padding: "3px 6px",
      fontSize: 11, background: "#fff", width: "100%", cursor: "pointer",
    };
    const inputStyle = {
      border: "1px solid #cbd5e1", borderRadius: 4, padding: "4px 8px",
      fontSize: 12, width: "100%", boxSizing: "border-box",
    };
    const labelStyle = { fontSize: 11, fontWeight: 600, color: "#475569", marginBottom: 3, display: "block" };
    const btnPrimary = {
      background: "#1e40af", color: "#fff", border: "none", borderRadius: 6,
      padding: "8px 20px", fontWeight: 700, fontSize: 13, cursor: "pointer", letterSpacing: "0.5px",
    };
    const btnDanger = {
      background: "transparent", color: "#ef4444", border: "1px solid #fca5a5",
      borderRadius: 4, padding: "2px 8px", fontSize: 11, cursor: "pointer",
    };
    const btnSuccess = {
      background: "#15803d", color: "#fff", border: "none", borderRadius: 6,
      padding: "8px 18px", fontWeight: 700, fontSize: 13, cursor: "pointer",
    };
    const thStyle = {
      background: "#1e3a5f", color: "#e2e8f0", padding: "7px 8px",

    };
    const tdStyle = (odd) => ({
      padding: "5px 7px", fontSize: 11, borderRight: "1px solid #e2e8f0",
      background: odd ? "#f8fafc" : "#fff", verticalAlign: "middle", textAlign: "center",
    });
    const sectionHead = {
      background: "#0f172a", color: "#94a3b8", padding: "4px 10px",
      fontSize: 10, fontWeight: 700, letterSpacing: "1.5px", textTransform: "uppercase",
    };

    /* ─── Helpers ────────────────────────────────────────────────────────── */
    function getFilteredModels(typeVal) {
      return TERMINAL_DATA[typeVal] || [];
    }

    /* ─── EndSelect component ────────────────────────────────────────────── */
    function EndSelect({ typeVal, modelVal, onTypeChange, onModelChange, coreCount }) {
      const filteredModels = getFilteredModels(typeVal);
      const n = parseInt(coreCount) || 0;
      // 母壓排永遠鎖定為「線芯數量P」，不提供下拉
      const pressLocked = typeVal === "母壓排";
      const lockedLabel = pressLocked ? `${n}P` : "";

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          <select value={typeVal} onChange={e => onTypeChange(e.target.value)} style={selStyle}>
            <option value="">── 類型 ──</option>
            {CONNECTOR_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
          </select>

          {typeVal && (
            pressLocked ? (
              <div style={{
                background: "#fef3c7", border: "1px solid #fcd34d", borderRadius: 4,
                padding: "3px 8px", fontSize: 11, color: "#92400e", fontWeight: 700,
                display: "flex", alignItems: "center", gap: 4,
              }}>
                🔒 {lockedLabel}
                <span style={{ color: "#b45309", marginLeft: 4 }}>↓ 套用全部</span>
              </div>
            ) : (
              <select value={modelVal} onChange={e => onModelChange(e.target.value)}
                style={{ ...selStyle, color: modelVal ? "#0f172a" : "#94a3b8" }}>
                <option value="">── 規格 ──</option>
                {filteredModels.map(t => {
                  const label = (typeVal === "歐式端子" && t.color)
                    ? `${t.color}（${t.model}）（${t.awg} / ${t.mm2}）`
                    : `${t.model}${t.awg !== "-" ? `  (${t.awg})` : ""}`;
                  return <option key={t.model} value={t.model}>{label}</option>;
                })}
              </select>
            )
          )}
        </div>
      );
    }

    /* ─── Main App ───────────────────────────────────────────────────────── */
    function WireManager() {
      const [wireList, setWireList] = useState([]);
      const [form, setForm] = useState(emptyForm());
      const [activeTab, setActiveTab] = useState("form");
      const [editId, setEditId] = useState(null);
      const [flash, setFlash] = useState("");
      const [importLog, setImportLog] = useState(null); // {ok, msg, detail}

      const showFlash = (msg) => { setFlash(msg); setTimeout(() => setFlash(""), 2500); };

      // ── Shared helper: get plain text from ExcelJS cell (handles richText) ──
      const cellText = (cell) => {
        if (!cell) return "";
        const val = cell.value;
        if (val === null || val === undefined) return "";
        if (typeof val === "object" && val.richText) {
          return val.richText.map(r => r.text || "").join("").trim();
        }
        if (typeof val === "object" && val.text) return String(val.text).trim();
        if (typeof val === "object" && val.result !== undefined) return String(val.result).trim();
        return String(val).trim();
      };

      // ── Shared helper: reverse-lookup model from full display label ──────
      const resolveModelFromLabel = (endType, label) => {
        if (!label || label === "-") return "";
        if (!endType || !TERMINAL_DATA[endType]) return label;
        const entries = TERMINAL_DATA[endType];
        for (const entry of entries) {
          if (entry.model === label) return entry.model;
          let full = entry.model;
          if (endType === "歐式端子" && entry.color) {
            full = `${entry.color}（${entry.model}）（${entry.awg} / ${entry.mm2}）`;
          } else if (entry.awg && entry.awg !== "-") {
            full = `${entry.model}（${entry.awg} / ${entry.mm2}）`;
          }
          if (full === label) return entry.model;
        }
        // Fallback: extract model code from "顏色（MODEL）（...）" pattern
        const m = label.match(/（([^（）\s]+(?:-[^\s（）]+)*)）（/);
        if (m) return m[1];
        // Or take everything before first "（"
        return label.split("（")[0].trim() || label;
      };

      const setCoreCount = (val) => {
        const n = Math.max(1, Math.min(50, parseInt(val) || 1));
        const newCores = Array.from({ length: n }, (_, i) => {
          const existing = form.cores[i];
          const autoColor = COLOR_CYCLE[i % COLOR_CYCLE.length];
          // New slot → auto-fill
          if (!existing) return { ...emptyCore(), color: autoColor };
          // Existing slot with no color yet → auto-fill
          if (!existing.color) return { ...existing, color: autoColor };
          // Existing slot already has a color → preserve
          return existing;
        });
        setForm({ ...form, coreCount: String(n), cores: newCores });
      };

      const updateCore = (i, field, value) => {
        const n = parseInt(form.coreCount) || 1;
        let cores = form.cores.map((c, idx) => idx === i ? { ...c, [field]: value } : c);

        if (field === "leftEndType")  cores[i] = { ...cores[i], leftEndModel: "" };
        if (field === "rightEndType") cores[i] = { ...cores[i], rightEndModel: "" };

        const autoFillModel = (modelField, newType) => {
          if (newType === "母壓排") {
            const lockedP = `${n}P`;
            cores[i] = { ...cores[i], [modelField]: lockedP };
            return lockedP;
          }
          return null;
        };

        if (field === "leftEndType") {
          const locked = autoFillModel("leftEndModel", value);
          if (value === "母壓排") {
            const model = locked || cores[i].leftEndModel;
            cores = cores.map(c => ({ ...c, leftEndType: "母壓排", leftEndModel: model }));
          }
        }
        if (field === "leftEndModel") {
          if (cores[i].leftEndType === "母壓排")
            cores = cores.map(c => ({ ...c, leftEndModel: value }));
        }
        if (field === "rightEndType") {
          const locked = autoFillModel("rightEndModel", value);
          if (value === "母壓排") {
            const model = locked || cores[i].rightEndModel;
            cores = cores.map(c => ({ ...c, rightEndType: "母壓排", rightEndModel: model }));
          }
        }
        if (field === "rightEndModel") {
          if (cores[i].rightEndType === "母壓排")
            cores = cores.map(c => ({ ...c, rightEndModel: value }));
        }

        setForm({ ...form, cores });
      };

      const handleSave = () => {
        if (!form.wireName.trim()) { showFlash("❌ 請輸入線名"); return; }
        if (editId !== null) {
          setWireList(wireList.map(w => w.id === editId ? { ...form, id: editId } : w));
          setEditId(null);
          showFlash("✅ 已更新線材");
        } else {
          setWireList([...wireList, { ...form, id: Date.now() }]);
          showFlash("✅ 已新增線材");
        }
        setForm(emptyForm(form.machineName));
        setActiveTab("list");
      };

      const handleEdit = (wire) => {
        setForm({ ...wire });
        setEditId(wire.id);
        setActiveTab("form");
      };

      const handleDelete = (id) => {
        if (window.confirm("確定刪除此線材？"))
          setWireList(wireList.filter(w => w.id !== id));
      };

      const handleImport = async (file) => {
        if (!file) return;
        setImportLog(null);
        const log = []; // step log
        const step = (msg) => { log.push(msg); console.log("[Import]", msg); };
        try {
          step(`開始讀取檔案：${file.name} (${(file.size/1024).toFixed(1)} KB)`);
          const buf = await file.arrayBuffer();
          step("ArrayBuffer 讀取完成");
          const wb = new ExcelJS.Workbook();
          await wb.xlsx.load(buf);
          step(`工作表數量：${wb.worksheets.length}`);
          const imported = [];

          // Safely extract any ExcelJS cell value as plain string
          const cellText = (ws, r, c) => {
            const cell = ws.getCell(r, c);
            const val = cell.value;
            if (val === null || val === undefined) return "";
            if (typeof val === "number") return String(val);
            if (typeof val === "string") return val.trim();
            if (typeof val === "object") {
              // Rich text object: { richText: [{text:"..."},...] }
              if (Array.isArray(val.richText))
                return val.richText.map(s => s.text || "").join("").trim();
              // Formula: { formula:"...", result:"..." }
              if (val.result !== undefined) return String(val.result).trim();
              // Shared string reference or other
              if (val.text !== undefined) return String(val.text).trim();
            }
            return String(val).trim();
          };

          wb.worksheets.forEach(ws => {
            const totalRows = ws.rowCount;

            // ── Get machine name from row 1 title ─────────────────
            let machineName = ws.name;
            const title = cellText(ws, 1, 1);
            const tm = title.match(/Handler Model[：:]\s*(.+)/);
            if (tm) machineName = tm[1].trim();

            // ── Pre-read all rows into a 2D array (row 3 onwards) ──
            // ws.getCell handles merged cells correctly:
            // non-master cells in a merge return the master cell object
            const rowData = [];
            for (let rn = 3; rn <= totalRows; rn++) {
              rowData.push(Array.from({ length: 13 }, (_, i) => cellText(ws, rn, i + 1)));
            }

            let carryName = "", carryLen = "", carryGauge = "", carryUnit = "AWG", carryWireRemark = "";
            let currentWire = null;

            rowData.forEach(cols => {
              // cols[0..12] = col 1..13
              const wireName   = cols[0];
              const wireLength = cols[1];
              const wireGauge  = cols[2];
              const coreIdxRaw = cols[3];
              const coreIdx    = parseInt(coreIdxRaw);

              // Skip rows with no core index (separators / blank rows)
              if (isNaN(coreIdx)) {
                // Still carry-forward any non-empty values (handles merged cols 1-3, 12)
                if (wireName)    carryName = wireName;
                if (wireLength)  carryLen  = wireLength.replace(/ mm$/, "");
                if (wireGauge) {
                  const gm = wireGauge.match(/^([\d.]+)\s*(AWG|mm²)$/);
                  carryGauge = gm ? gm[1] : wireGauge;
                  carryUnit  = gm ? gm[2] : "AWG";
                }
                if (cols[11]) carryWireRemark = cols[11];
                return;
              }

              // Carry-forward non-empty values for this row
              if (wireName)    carryName = wireName;
              if (wireLength)  carryLen  = wireLength.replace(/ mm$/, "");
              if (wireGauge) {
                const gm = wireGauge.match(/^([\d.]+)\s*(AWG|mm²)$/);
                carryGauge = gm ? gm[1] : wireGauge;
                carryUnit  = gm ? gm[2] : "AWG";
              }
              if (cols[11]) carryWireRemark = cols[11];

              // New wire starts at coreIdx === 1
              if (coreIdx === 1) {
                currentWire = {
                  id: Date.now() + Math.random(),
                  machineName,
                  wireName:      carryName,
                  wireLength:    carryLen,
                  wireGauge:     carryGauge,
                  wireGaugeUnit: carryUnit,
                  wireRemark:    carryWireRemark,
                  coreCount:     "1",
                  cores:         [],
                };
                imported.push(currentWire);
              }

              if (!currentWire) return;

              const leftType  = (cols[6] && cols[6] !== "-") ? cols[6] : "";
              const rightType = (cols[8] && cols[8] !== "-") ? cols[8] : "";

              currentWire.cores.push({
                color:         (cols[4] && cols[4] !== "-") ? cols[4] : "",
                code:          (cols[5] && cols[5] !== "-") ? cols[5] : "",
                leftEndType:   leftType,
                leftEndModel:  resolveModelFromLabel(leftType,  cols[7]),
                rightEndType:  rightType,
                rightEndModel: resolveModelFromLabel(rightType, cols[9]),
                remark:        cols[10] || "",
              });
              currentWire.coreCount    = String(currentWire.cores.length);
              currentWire.wireRemark   = carryWireRemark;
            });
          });

          step(`解析完成，共 ${imported.length} 條線材`);
          if (imported.length > 0) {
            step(`第一條：${imported[0].wireName}，${imported[0].cores.length} 芯`);
          }

          if (imported.length === 0) {
            setImportLog({ ok: false, msg: "未找到可載入的線材資料", detail: log.join("\n") });
            return;
          }
          setWireList(imported);
          setImportLog({ ok: true, msg: `✅ 已成功載入 ${imported.length} 條線材`, detail: log.join("\n") });
          setActiveTab("list");
        } catch (err) {
          console.error("Import error:", err);
          log.push(`❌ 例外：${err.message}`);
          log.push(err.stack || "");
          setImportLog({ ok: false, msg: `載入失敗：${err.message || "未知錯誤"}`, detail: log.join("\n") });
        }
      };

      const handleExport = async () => {
        const wb = new ExcelJS.Workbook();
        wb.creator = "線材管理系統";

        // ── palette ──────────────────────────────────────────
        const C = {
          hdrBg:   "1E3A5F", hdrFg:   "E2E8F0",
          titleBg: "0F172A", titleFg:  "94A3B8",
          odd:     "F8FAFC", even:     "FFFFFF",
          wireIdx: "1E40AF", coreIdx:  "64748B",
          leftBg:  "DBEAFE", leftFg:   "1E40AF",
          rightBg: "DCFCE7", rightFg:  "166534",
          sepBg:   "E2E8F0",
          wireFg:  "1E40AF",
          border:  "CBD5E1",
        };

        // 線色 → Excel 背景色對照表（bg hex, 前景用黑或白）
        const WIRE_COLOR_MAP = {
          "棕":  { bg: "92400E", fg: "FFFFFF" },
          "黑":  { bg: "1E293B", fg: "FFFFFF" },
          "紅":  { bg: "EF4444", fg: "FFFFFF" },
          "橙":  { bg: "F97316", fg: "FFFFFF" },
          "黃":  { bg: "EAB308", fg: "1E293B" },
          "綠":  { bg: "22C55E", fg: "FFFFFF" },
          "藍":  { bg: "3B82F6", fg: "FFFFFF" },
          "紫":  { bg: "A855F7", fg: "FFFFFF" },
          "白":  { bg: "F8FAFC", fg: "1E293B" },
          "灰":  { bg: "94A3B8", fg: "FFFFFF" },
          "黃綠":{ bg: "84CC16", fg: "1E293B" },
        };

        const borderAll = (color) => ({
          top:    { style: "thin", color: { argb: "FF" + color } },
          bottom: { style: "thin", color: { argb: "FF" + color } },
          left:   { style: "thin", color: { argb: "FF" + color } },
          right:  { style: "thin", color: { argb: "FF" + color } },
        });
        const fill = (hex) => ({ type: "pattern", pattern: "solid", fgColor: { argb: "FF" + hex } });
        const font = (hex, bold=false, sz=10) => ({ name: "Microsoft JhengHei", size: sz, bold, color: { argb: "FF" + hex } });
        const align = (h="center", v="middle", wrap=false) => ({ horizontal: h, vertical: v, wrapText: wrap });

        // helper: style a row of cells
        const styleRow = (row, fills, fonts, aligns) => {
          row.eachCell({ includeEmpty: true }, (cell, col) => {
            const i = col - 1;
            if (fills[i])  cell.fill   = fill(fills[i]);
            if (fonts[i])  cell.font   = fonts[i];
            if (aligns[i]) cell.alignment = aligns[i];
            cell.border = borderAll(C.border);
          });
        };

        // ── Helper: resolve full label for all terminal types ───
        const resolveSpecLabel = (endType, endModel) => {
          if (!endModel || endModel === "-") return endModel || "-";
          if (!endType || !TERMINAL_DATA[endType]) return endModel;
          const entry = TERMINAL_DATA[endType].find(t => t.model === endModel);
          if (!entry) return endModel;
          if (endType === "歐式端子" && entry.color) {
            return `${entry.color}（${entry.model}）（${entry.awg} / ${entry.mm2}）`;
          }
          if (entry.awg && entry.awg !== "-") {
            return `${entry.model}（${entry.awg} / ${entry.mm2}）`;
          }
          return endModel;
        };

        // ── Group by machine ──────────────────────────────────
        const grouped = wireList.reduce((acc, w) => {
          const k = w.machineName || "(未命名機器)";
          (acc[k] = acc[k] || []).push(w);
          return acc;
        }, {});

        const COLS = 13; // A..M

        Object.entries(grouped).forEach(([machine, wires]) => {
          const ws = wb.addWorksheet(machine.substring(0, 31));

          // column widths
          ws.columns = [
            { width: 14 }, // 線名
            { width: 10 }, // 線長
            { width: 10 }, // 線徑
            { width: 6  }, // 芯序
            { width: 8  }, // 線色
            { width: 14 }, // 線碼
            { width: 12 }, // 左端類型
            { width: 22 }, // 左端規格
            { width: 12 }, // 右端類型
            { width: 22 }, // 右端規格
            { width: 20 }, // 芯序備註
            { width: 22 }, // 線組備註
            { width: 4  }, // (padding)
          ];

          // ── Machine title row ─────────────────────────────
          const titleRow = ws.addRow([`Handler Model：${machine}`]);
          ws.mergeCells(titleRow.number, 1, titleRow.number, COLS);
          titleRow.height = 22;
          titleRow.getCell(1).fill = fill(C.titleBg);
          titleRow.getCell(1).font = font(C.titleFg, true, 12);
          titleRow.getCell(1).alignment = align("left");
          titleRow.getCell(1).border = borderAll(C.titleBg);

          // ── Header row ────────────────────────────────────
          const hdrRow = ws.addRow(["線名","線長(mm)","線徑","芯序","線色","線碼","左端類型","左端規格","右端類型","右端規格","芯序備註","線組備註",""]);
          hdrRow.height = 18;
          hdrRow.eachCell({ includeEmpty: true }, cell => {
            cell.fill      = fill(C.hdrBg);
            cell.font      = font(C.hdrFg, true, 10);
            cell.alignment = align("center");
            cell.border    = borderAll(C.hdrBg);
          });

          // ── Wire rows ─────────────────────────────────────
          wires.forEach((wire, wi) => {
            const rowBg   = wi % 2 === 0 ? C.even : C.odd;
            const startR  = ws.lastRow.number + 1;

            wire.cores.forEach((core, ci) => {
              const isFirst = ci === 0;
              const row = ws.addRow([
                isFirst ? wire.wireName   : "",
                isFirst ? (wire.wireLength ? wire.wireLength + " mm" : "-") : "",
                isFirst ? (wire.wireGauge  ? wire.wireGauge + " " + wire.wireGaugeUnit : "-") : "",
                ci + 1,
                core.color   || "-",
                core.code    || "-",
                core.leftEndType  || "-",
                resolveSpecLabel(core.leftEndType, core.leftEndModel),
                core.rightEndType  || "-",
                resolveSpecLabel(core.rightEndType, core.rightEndModel),
                core.remark        || "",
                isFirst ? (wire.wireRemark || "") : "",
                "",
              ]);
              row.height = 16;

              row.eachCell({ includeEmpty: true }, (cell, col) => {
                cell.fill      = fill(rowBg);
                cell.font      = font("334155", false, 10);
                cell.alignment = align("center", "middle");
                cell.border    = borderAll(C.border);
              });

              // wire name / length / gauge → bold blue (first core only, will merge below)
              if (isFirst) {
                row.getCell(1).font = font(C.wireFg, true, 10);
              }
              // core index
              row.getCell(4).font = font(C.coreIdx, true, 10);

              // 線色欄位 → 套用對應背景色
              const colorEntry = WIRE_COLOR_MAP[core.color];
              if (colorEntry) {
                const colorCell = row.getCell(5);
                colorCell.fill = fill(colorEntry.bg);
                colorCell.font = font(colorEntry.fg, true, 10);
              }

              // left type badge
              if (core.leftEndType) {
                row.getCell(7).fill = fill(C.leftBg);
                row.getCell(7).font = font(C.leftFg, true, 9);
              }
              // right type badge
              if (core.rightEndType) {
                row.getCell(9).fill = fill(C.rightBg);
                row.getCell(9).font = font(C.rightFg, true, 9);
              }
              // core remark col 11 - left-align
              row.getCell(11).font = font("475569", false, 9);
              row.getCell(11).alignment = align("left", "middle", true);
            });

            const endR = ws.lastRow.number;

            // merge wire info cells if multi-core
            if (wire.cores.length > 1) {
              // Always merge: wire name(1), length(2), gauge(3), wireRemark(12)
              [1, 2, 3, 12].forEach(col => {
                ws.mergeCells(startR, col, endR, col);
                const cell = ws.getCell(startR, col);
                cell.alignment = align("center", "middle", col === 12);
              });

              // Conditionally merge left/right end cols when ALL cores share same value
              // Col 7=左端類型, 8=左端規格, 9=右端類型, 10=右端規格
              [
                { col: 7,  values: wire.cores.map(c => c.leftEndType) },
                { col: 8,  values: wire.cores.map(c => c.leftEndModel) },
                { col: 9,  values: wire.cores.map(c => c.rightEndType) },
                { col: 10, values: wire.cores.map(c => c.rightEndModel) },
              ].forEach(({ col, values }) => {
                const allSame = values.every(v => v === values[0]);
                if (allSame) {
                  ws.mergeCells(startR, col, endR, col);
                  const cell = ws.getCell(startR, col);
                  cell.alignment = align("center", "middle");
                  // Re-apply badge fill for type cols after merge
                  if (col === 7 && wire.cores[0].leftEndType) {
                    cell.fill = fill(C.leftBg);
                    cell.font = font(C.leftFg, true, 9);
                  }
                  if (col === 9 && wire.cores[0].rightEndType) {
                    cell.fill = fill(C.rightBg);
                    cell.font = font(C.rightFg, true, 9);
                  }
                }
              });
            }
            // style wireRemark cell (col 12)
            const wRemarkCell = ws.getCell(startR, 12);
            wRemarkCell.font = font("475569", false, 9);
            wRemarkCell.alignment = align("left", "middle", true);

            // separator row between wires
            if (wi < wires.length - 1) {
              const sep = ws.addRow(Array(COLS).fill(""));
              sep.height = 4;
              sep.eachCell({ includeEmpty: true }, cell => {
                cell.fill   = fill(C.sepBg);
                cell.border = borderAll(C.sepBg);
              });
            }
          });

          // blank row at end of sheet
          ws.addRow([]);
        });

        // ── Download ──────────────────────────────────────────
        const buf = await wb.xlsx.writeBuffer();
        const blob = new Blob([buf], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        const firstMachine = Object.keys(grouped)[0] || "未命名";
        a.download = `${firstMachine}_線材總表_${new Date().toISOString().slice(0,10)}.xlsx`;
        a.click();
        showFlash("📥 匯出 Excel 成功！");
      };

      const grouped = wireList.reduce((acc, w) => {
        const k = w.machineName || "(未命名機器)";
        (acc[k] = acc[k] || []).push(w);
        return acc;
      }, {});

      return (
        <div style={{ fontFamily: "'Microsoft JhengHei','Noto Sans TC',sans-serif", background: "#f1f5f9", minHeight: "100vh" }}>

          {/* ── Header ── */}
          <div style={{ background: "#0f172a", color: "#fff", padding: "14px 24px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <img
                src="https://www.honprec.com/images/logo.png"
                alt="HPI Logo"
                style={{ height: 40, objectFit: "contain", filter: "brightness(0) invert(1)" }}
                onError={e => { e.target.style.display = "none"; }}
              />
              <div>
                <div style={{ fontSize: 16, fontWeight: 800, letterSpacing: 1, lineHeight: 1.3, display: "flex", alignItems: "center", gap: 8 }}>
                  HPI 電控線材資料管理系統
                  <span
                    onClick={() => setActiveTab("history")}
                    style={{ background: "#1e40af", color: "#fff", fontSize: 10, fontWeight: 700,
                      padding: "2px 7px", borderRadius: 4, letterSpacing: "0.5px", cursor: "pointer",
                      border: "1px solid #3b82f6" }}>
                    {APP_VERSION}
                  </span>
                </div>
                <div style={{ fontSize: 10, color: "#64748b", marginTop: 1, letterSpacing: "0.5px" }}>Wire / Cable Management System</div>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {flash && (
                <div style={{ background: "#1e3a5f", color: "#93c5fd", padding: "6px 14px", borderRadius: 6, fontSize: 12, fontWeight: 600 }}>
                  {flash}
                </div>
              )}
              {/* Import button */}
              <label style={{
                background: "#1e40af", color: "#fff", border: "none", borderRadius: 6,
                padding: "7px 14px", fontWeight: 700, fontSize: 12, cursor: "pointer",
                display: "inline-flex", alignItems: "center", gap: 5,
              }}>
                📂 載入 Excel
                <input
                  type="file" accept=".xlsx" style={{ display: "none" }}
                  onChange={e => { handleImport(e.target.files[0]); e.target.value = ""; }}
                />
              </label>
              {wireList.length > 0 && (
                <button onClick={handleExport} style={{ ...btnSuccess, fontSize: 12 }}>
                  📥 匯出 Excel ({wireList.length} 筆)
                </button>
              )}
            </div>
          </div>

          {/* ── Import Log Panel ── */}
          {importLog && (
            <div style={{
              background: importLog.ok ? "#f0fdf4" : "#fef2f2",
              border: `1px solid ${importLog.ok ? "#86efac" : "#fca5a5"}`,
              margin: "12px 20px 0", borderRadius: 8, padding: "10px 14px",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13, color: importLog.ok ? "#166534" : "#991b1b" }}>
                    {importLog.ok ? "✅" : "❌"} {importLog.msg}
                  </div>
                  <details style={{ marginTop: 6 }}>
                    <summary style={{ fontSize: 11, color: "#64748b", cursor: "pointer" }}>
                      {importLog.ok ? "顯示載入紀錄" : "▶ 展開錯誤詳情（請截圖回報）"}
                    </summary>
                    <pre style={{ marginTop: 6, fontSize: 10, color: "#334155", background: "#f8fafc",
                      padding: 8, borderRadius: 4, overflowX: "auto", whiteSpace: "pre-wrap",
                      maxHeight: 200, overflowY: "auto" }}>
                      {importLog.detail}
                    </pre>
                  </details>
                </div>
                <button onClick={() => setImportLog(null)}
                  style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 16, color: "#94a3b8", padding: "0 4px" }}>
                  ✕
                </button>
              </div>
            </div>
          )}

          {/* ── Tabs ── */}
          <div style={{ background: "#1e293b", display: "flex", gap: 2, padding: "0 16px" }}>
            {[["form", "✏️ 新增 / 編輯"], ["list", `📋 線材總表 (${wireList.length})`], ["history", "📜 更新歷史"]].map(([tab, label]) => (
              <button key={tab} onClick={() => setActiveTab(tab)}
                style={{
                  padding: "10px 18px", border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700,
                  background: activeTab === tab ? "#fff" : "transparent",
                  color: activeTab === tab ? "#1e40af" : "#94a3b8",
                  borderRadius: "6px 6px 0 0", marginBottom: -1,
                }}>
                {label}
              </button>
            ))}
          </div>

          {/* ── FORM TAB ── */}
          {activeTab === "form" && (
            <div style={{ padding: 20, maxWidth: 1100, margin: "0 auto" }}>
              <div style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 6px rgba(0,0,0,.08)", overflow: "hidden" }}>
                <div style={sectionHead}>線材組態 · Wire Configuration</div>
                <div style={{ padding: 18, display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(160px,1fr))", gap: 14 }}>
                  <div>
                    <label style={labelStyle}>Handler Model</label>
                    <input style={inputStyle} placeholder="e.g. HT-1028C"
                      value={form.machineName} onChange={e => setForm({ ...form, machineName: e.target.value })} />
                  </div>
                  <div>
                    <label style={labelStyle}>線名 <span style={{ color: "#ef4444" }}>*</span></label>
                    <input style={inputStyle} placeholder="e.g. PWR-001"
                      value={form.wireName} onChange={e => setForm({ ...form, wireName: e.target.value })} />
                  </div>
                  <div>
                    <label style={labelStyle}>線長 (mm)</label>
                    <input style={inputStyle} type="number" placeholder="e.g. 300"
                      value={form.wireLength} onChange={e => setForm({ ...form, wireLength: e.target.value })} />
                  </div>
                  <div>
                    <label style={labelStyle}>線徑</label>
                    <div style={{ display: "flex", gap: 4 }}>
                      <input style={{ ...inputStyle, flex: 1 }} placeholder="數值"
                        value={form.wireGauge} onChange={e => setForm({ ...form, wireGauge: e.target.value })} />
                      <select style={{ ...selStyle, width: 72, flexShrink: 0 }}
                        value={form.wireGaugeUnit} onChange={e => setForm({ ...form, wireGaugeUnit: e.target.value })}>
                        <option>AWG</option>
                        <option>mm²</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label style={labelStyle}>線芯數量</label>
                    <input style={{ ...inputStyle, width: 80 }} type="number" min="1" max="50"
                      value={form.coreCount} onChange={e => setCoreCount(e.target.value)} />
                  </div>
                </div>

                <div style={sectionHead}>線組資訊 · Wire Information</div>
                <div style={{ overflowX: "auto", padding: "0 0 4px 0" }}>
                  <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 900 }}>
                    <thead>
                      <tr>
                        {["芯序","線色","線碼","左端類型 / 規格","右端類型 / 規格","備註"].map((h, i) => (
                          <th key={i} style={{ ...thStyle, width: i === 0 ? 44 : i <= 2 ? 110 : i === 5 ? 140 : undefined }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {form.cores.map((core, i) => (
                        <tr key={i}>
                          <td style={{ ...tdStyle(i % 2), fontWeight: 700, fontSize: 13, color: "#1e40af" }}>{i + 1}</td>

                          <td style={tdStyle(i % 2)}>
                            <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                              <div style={{
                                width: 12, height: 12, borderRadius: "50%", flexShrink: 0,
                                background: COLOR_DOTS[core.color] || "#e2e8f0",
                                border: "1px solid #cbd5e1",
                              }} />
                              <input style={inputStyle} list={`cl-${i}`} placeholder="線色"
                                value={core.color} onChange={e => updateCore(i, "color", e.target.value)} />
                              <datalist id={`cl-${i}`}>{WIRE_COLORS.map(c => <option key={c} value={c} />)}</datalist>
                            </div>
                          </td>

                          <td style={tdStyle(i % 2)}>
                            <input style={inputStyle} placeholder="線碼"
                              value={core.code} onChange={e => updateCore(i, "code", e.target.value)} />
                          </td>

                          <td style={{ ...tdStyle(i % 2), textAlign: "left", minWidth: 220 }}>
                            <EndSelect
                              typeVal={core.leftEndType} modelVal={core.leftEndModel}
                              onTypeChange={v => updateCore(i, "leftEndType", v)}
                              onModelChange={v => updateCore(i, "leftEndModel", v)}
                              coreCount={form.coreCount} isCore0={i === 0} />
                          </td>

                          <td style={{ ...tdStyle(i % 2), textAlign: "left", minWidth: 220 }}>
                            <EndSelect
                              typeVal={core.rightEndType} modelVal={core.rightEndModel}
                              onTypeChange={v => updateCore(i, "rightEndType", v)}
                              onModelChange={v => updateCore(i, "rightEndModel", v)}
                              coreCount={form.coreCount} isCore0={i === 0} />
                          </td>

                          <td style={{ ...tdStyle(i % 2), textAlign: "left", minWidth: 140 }}>
                            <input style={{ ...inputStyle, fontSize: 11 }} placeholder="備註..."
                              value={core.remark} onChange={e => updateCore(i, "remark", e.target.value)} />
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div style={{ padding: "12px 18px", borderTop: "1px solid #e2e8f0", background: "#f8fafc" }}>
                  <label style={{ ...labelStyle, marginBottom: 5 }}>線組備註</label>
                  <textarea
                    style={{ ...inputStyle, height: 54, resize: "vertical", fontSize: 12 }}
                    placeholder="針對此線組的整體備註事項..."
                    value={form.wireRemark}
                    onChange={e => setForm({ ...form, wireRemark: e.target.value })}
                  />
                </div>
                <div style={{ padding: "12px 18px", borderTop: "1px solid #e2e8f0", display: "flex", gap: 10, alignItems: "center" }}>
                  <button style={btnPrimary} onClick={handleSave}>
                    {editId !== null ? "💾 更新線材" : "＋ 建立線材"}
                  </button>
                  {editId !== null && (
                    <button style={{ ...btnDanger, padding: "7px 14px" }}
                      onClick={() => { setEditId(null); setForm(emptyForm(form.machineName)); }}>
                      取消編輯
                    </button>
                  )}
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>建立後可在「線材總表」查看或匯出</span>
                </div>
              </div>
            </div>
          )}

          {/* ── LIST TAB ── */}
          {activeTab === "list" && (
            <div style={{ padding: 20, maxWidth: 1400, margin: "0 auto" }}>
              {wireList.length === 0 ? (
                <div style={{ textAlign: "center", padding: "60px 0", color: "#94a3b8", fontSize: 14 }}>
                  <div style={{ fontSize: 40, marginBottom: 10 }}>📂</div>
                  尚無線材資料，請至「新增 / 編輯」頁面建立
                </div>
              ) : (
                Object.entries(grouped).map(([machine, wires]) => (
                  <div key={machine} style={{ background: "#fff", borderRadius: 10, boxShadow: "0 1px 6px rgba(0,0,0,.08)", marginBottom: 20, overflow: "hidden" }}>
                    <div style={{ ...sectionHead, padding: "8px 14px" }}>
                      🖥️ Handler Model：{machine} · {wires.length} 條線材
                    </div>
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 980 }}>
                        <thead>
                          <tr>
                            {["線名","線組備註","線長","線徑","芯序","線色","線碼","左端類型","左端規格","右端類型","右端規格","芯序備註","操作"].map((h, i) => (
                              <th key={i} style={{ ...thStyle, fontSize: 10 }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {wires.flatMap((wire, wi) =>
                            wire.cores.map((core, ci) => (
                              <tr key={`${wire.id}-${ci}`}>
                                {ci === 0 && (
                                  <>
                                    <td style={{ ...tdStyle(wi % 2), fontWeight: 700, color: "#1e40af" }} rowSpan={wire.cores.length}>
                                      {wire.wireName}
                                    </td>
                                    <td style={{ ...tdStyle(wi % 2), maxWidth: 160, textAlign: "left", color: "#64748b", fontSize: 10 }} rowSpan={wire.cores.length}>
                                      {wire.wireRemark || "-"}
                                    </td>
                                    <td style={tdStyle(wi % 2)} rowSpan={wire.cores.length}>
                                      {wire.wireLength ? `${wire.wireLength} mm` : "-"}
                                    </td>
                                    <td style={tdStyle(wi % 2)} rowSpan={wire.cores.length}>
                                      {wire.wireGauge ? `${wire.wireGauge} ${wire.wireGaugeUnit}` : "-"}
                                    </td>
                                  </>
                                )}
                                <td style={{ ...tdStyle(wi % 2), fontWeight: 600, color: "#64748b" }}>{ci + 1}</td>
                                <td style={tdStyle(wi % 2)}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 5, justifyContent: "center" }}>
                                    <div style={{
                                      width: 10, height: 10, borderRadius: "50%",
                                      background: COLOR_DOTS[core.color] || "#e2e8f0",
                                      border: "1px solid #cbd5e1", flexShrink: 0,
                                    }} />
                                    {core.color || "-"}
                                  </div>
                                </td>
                                <td style={tdStyle(wi % 2)}>{core.code || "-"}</td>
                                <td style={tdStyle(wi % 2)}>
                                  {core.leftEndType
                                    ? <span style={{ background: "#dbeafe", color: "#1e40af", borderRadius: 3, padding: "1px 6px", fontSize: 10 }}>{core.leftEndType}</span>
                                    : "-"}
                                </td>
                                <td style={tdStyle(wi % 2)}>{core.leftEndModel || "-"}</td>
                                <td style={tdStyle(wi % 2)}>
                                  {core.rightEndType
                                    ? <span style={{ background: "#dcfce7", color: "#166534", borderRadius: 3, padding: "1px 6px", fontSize: 10 }}>{core.rightEndType}</span>
                                    : "-"}
                                </td>
                                <td style={tdStyle(wi % 2)}>{core.rightEndModel || "-"}</td>
                                <td style={{ ...tdStyle(wi % 2), maxWidth: 140, textAlign: "left", color: "#64748b", fontSize: 10 }}>{core.remark || "-"}</td>
                                {ci === 0 && (
                                  <td style={tdStyle(wi % 2)} rowSpan={wire.cores.length}>
                                    <div style={{ display: "flex", gap: 4, justifyContent: "center", flexDirection: "column", alignItems: "center" }}>
                                      <button style={{ background: "#e0f2fe", color: "#0369a1", border: "1px solid #bae6fd", borderRadius: 4, padding: "2px 10px", fontSize: 11, cursor: "pointer" }}
                                        onClick={() => handleEdit(wire)}>編輯</button>
                                      <button style={btnDanger} onClick={() => handleDelete(wire.id)}>刪除</button>
                                    </div>
                                  </td>
                                )}
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                ))
              )}
              {wireList.length > 0 && (
                <div style={{ textAlign: "right", padding: "0 4px 16px" }}>
                  <button style={btnSuccess} onClick={handleExport}>📥 匯出 Excel 總表</button>
                </div>
              )}
            </div>
          )}

          {/* ── HISTORY TAB ── */}
          {activeTab === "history" && (
            <div style={{ padding: 20, maxWidth: 860, margin: "0 auto" }}>
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#1e3a5f" }}>📜 更新歷史</div>
                <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>Version History</div>
              </div>
              {HISTORY.map((entry) => (
                <div key={entry.version} style={{ background: "#fff", borderRadius: 10,
                  boxShadow: "0 1px 6px rgba(0,0,0,.07)", marginBottom: 16, overflow: "hidden" }}>
                  {/* Version header */}
                  <div style={{ background: "#0f172a", padding: "10px 18px", display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 18, fontWeight: 800, color: "#e2e8f0" }}>{entry.version}</span>
                    <span style={{ background: "#" + entry.tagBg, color: "#" + entry.tagColor,
                      fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 4 }}>
                      {entry.tag}
                    </span>
                    <span style={{ fontSize: 11, color: "#64748b", marginLeft: "auto" }}>{entry.date}</span>
                  </div>
                  {/* Items */}
                  <div style={{ padding: "12px 20px" }}>
                    {entry.items.map((item, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, padding: "6px 0",
                        borderBottom: i < entry.items.length - 1 ? "1px solid #f1f5f9" : "none" }}>
                        <span style={{ color: "#94a3b8", fontSize: 13, flexShrink: 0, marginTop: 1 }}>▸</span>
                        <span style={{ fontSize: 12, color: "#334155", lineHeight: 1.6 }}>
                          {item.startsWith("【新功能】") ? (
                            <>
                              <span style={{ background: "#dcfce7", color: "#15803d", fontWeight: 700,
                                fontSize: 10, padding: "1px 5px", borderRadius: 3, marginRight: 5 }}>新功能</span>
                              {item.replace("【新功能】", "")}
                            </>
                          ) : item.startsWith("【改善】") ? (
                            <>
                              <span style={{ background: "#fef9c3", color: "#854d0e", fontWeight: 700,
                                fontSize: 10, padding: "1px 5px", borderRadius: 3, marginRight: 5 }}>改善</span>
                              {item.replace("【改善】", "")}
                            </>
                          ) : item}
                        </span>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WireManager />);
  </script>
</body>
</html>
